name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev
    - name: Install Pip Dependencies
      run: |
        pip install --upgrade pip
        pip install --upgrade Cython==0.29.33 virtualenv buildozer
    - name: Get Date for Caching
      id: get-date
      run: |
        echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ steps.get-date.outputs.date }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    - name: Build Android APK
      run: |
        # 自动输入 yes 同意安卓 SDK 的用户许可协议，并开始打包
        yes | buildozer android debug
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ECG-App-APK
        path: bin/*.apk
